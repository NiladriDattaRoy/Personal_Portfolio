              <!-- ====== CONTACT SECTION ====== -->
              <section class="contact-section" id="contact">
                <div class="contact-header">
                  <h2 data-aos="fade-left" data-aos-duration="1000" data-aos-delay="700">Get In Touch</h2>
                  <div class="underline"></div>
                </div>

                <div class="contact-container">
                  <!-- Contact Info -->
                  <div class="contact-info" data-aos="fade-right" data-aos-duration="1000">
                    <h3>Contact Information</h3>

                    <div class="info-item">
                      <div class="icon"><i class="fas fa-phone"></i></div>
                      <div>
                        <p class="label">Phone</p>
                        <p>9830883792 / 7605868949</p>
                      </div>
                    </div>

                    <div class="info-item">
                      <div class="icon"><i class="fas fa-envelope"></i></div>
                      <div>
                        <p class="label">Email</p>
                        <p><a href="mailto:niladridattaroy25@gmail.com">niladridattaroy25@gmail.com</a></p>
                      </div>
                    </div>

                    <div class="info-item">
                      <div class="icon"><i class="fab fa-linkedin"></i></div>
                      <div>
                        <p class="label">LinkedIn</p>
                        <p><a href="https://www.linkedin.com/in/niladridattaroy25/" target="_blank">Niladri Datta Roy</a></p>
                      </div>
                    </div>

                    <div class="info-item">
                      <div class="icon"><i class="fab fa-github"></i></div>
                      <div>
                        <p class="label">GitHub</p>
                        <p><a href="https://github.com/NiladriDattaRoy" target="_blank">NiladriDattaRoy</a></p>
                      </div>
                    </div>
                  </div>

                  <!-- Contact Form -->
                  <div class="contact-form" data-aos="fade-right" data-aos-duration="1000">
                    <h3>Send a Message</h3>
                    <form action="https://formsubmit.co/niladridattaroy25@gmail.com" method="POST">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_subject" value="New Contact Message">

                      <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" placeholder="Your name" required />
                      </div>

                      <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="your.email@example.com" required />
                      </div>

                      <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" rows="5" placeholder="Your message..." required></textarea>
                      </div>

                      <button type="submit">
                        Send Message <i class="fas fa-paper-plane" style="margin-left:8px;"></i>
                      </button>
                    </form>
                  </div>
                </div>
              </section>
