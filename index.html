  <input type="text" id="skillInput" placeholder="Enter a skill" />
  <button onclick="addSkill()">Add Skill</button>
</div>
async function loadSkills() {
  const res = await fetch("http://127.0.0.1:5000/skills");
  const data = await res.json();

  const container = document.querySelector(".skills-grid");
  container.innerHTML = "";

  data.forEach(skill => {
    const div = document.createElement("div");
    div.classList.add("skill-card");
    div.innerHTML = `<span>${skill.name}</span>`;
    container.appendChild(div);
  });
}

async function addSkill() {
  const input = document.getElementById("skillInput");
  const skill = input.value;

  await fetch("http://127.0.0.1:5000/add-skill", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name: skill })
  });

  input.value = "";
  loadSkills();
}

loadSkills();
</script>
